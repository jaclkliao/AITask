server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/taskagent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
  sql:
    init:
      schema-locations: classpath:db/schema.sql
      mode: always
      continue-on-error: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 自定义LLM配置
llm:
  api-key: ${LLM_API_KEY:}
  api-url: ${LLM_API_URL:https://api.deepseek.com/v1/chat/completions}
  timeout: ${LLM_TIMEOUT:15000}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:a7f3e9d2c4b8a1f6e5d0c9b2a3f4e5d6c7b8a9f0e1d2c3b4a5f6e7d8c9b0a1f2}
  expiration: ${JWT_EXPIRATION:86400000}
